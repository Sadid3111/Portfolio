<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="icon" type="image/png" sizes="32x32" href="thumbnails/h1.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#e0e5ec;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px;
    padding:20px 30px;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    width:350px;
    padding:25px;
    border-radius:20px;
    background:#e0e5ec;
    box-shadow: 10px 10px 20px #b8bcc2,
                -10px -10px 20px #ffffff;
}

.status{
    font-size:12px;
    padding:6px 12px;
    border-radius:20px;
    background:#e0ece2;
    box-shadow: inset 3px 3px 6px #b8bcc2,
                inset -3px -3px 6px #ffffff;
}

.auth{
    width:300px;
    margin:100px auto;
    padding:30px;
    text-align:center;
}

#logoutBtn{
    position:fixed;
    top:20px;
    right:20px;
}
    
/* Title */
.logo{
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

/* Subtitle */
.sub{
    font-size:14px;
    opacity:0.6;
    margin-top:5px;
}

/* Layout */
.wrapper{
    display:flex;
    height:100vh;
}

/* Left Panel (Form) */
.left{
    width:35%;
    padding:30px;
    box-sizing:border-box;
    overflow:auto;
}

/* Right Panel (Products) */
.right{
    width:65%;
    padding:30px;
    box-sizing:border-box;
    overflow:auto;
}
*{
    box-sizing: border-box;
    font-family:'Saira',sans-serif;
}

/* Neumorphic base */
.neu{
    background:#e0e5ec;
    border-radius:20px;
    box-shadow: 10px 10px 20px #b8bcc2,
                -10px -10px 20px #ffffff;
}

/* Inputs */
input, select, textarea{
    width:100%;
    margin:12px 0;
    padding:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#e0e5ec;
    box-shadow: inset 5px 5px 10px #b8bcc2,
                inset -5px -5px 10px #ffffff;
    display:block;
}

/* Button */
button{
    padding:12px;
    margin:6px;   /* adds gap around each button */
    border:none;
    border-radius:12px;
    background:#e0e5ec;
    cursor:pointer;
    font-weight:bold;
    box-shadow: 5px 5px 10px #b8bcc2,
                -5px -5px 10px #ffffff;
    transition:0.2s;
}

button:hover{
    box-shadow: inset 5px 5px 10px #b8bcc2,
                inset -5px -5px 10px #ffffff;
}

/* Section */
.section{
    padding:25px;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
}

/* Card */
.card{
    padding:15px;
    border-radius:18px;
    background:#e0e5ec;
    box-shadow: 8px 8px 15px #b8bcc2,
                -8px -8px 15px #ffffff;
    display:flex;
    flex-direction:column;
}

/* Thumbnail */
.thumb{
    width:100%;
    height:140px;
    border-radius:12px;
    object-fit:cover;
    margin-bottom:10px;
    box-shadow: inset 3px 3px 6px #b8bcc2,
                inset -3px -3px 6px #ffffff;
}

/* Title */
.title{
    font-weight:bold;
    margin-bottom:10px;
}

/* Category */
.cat{
    font-size:12px;
    opacity:0.6;
    margin-bottom:10px;
}
</style>

</head>

<div id="editModal" class="modal">
    <div class="modal-content neu">

        <h2>Edit Product</h2>

        <input id="editTitle" placeholder="Title">
        <input id="editThumbnail" placeholder="Thumbnail URL">
        <input id="editVideo" placeholder="Video URL">
        <textarea id="editDesc" placeholder="Description"></textarea>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="saveEdit()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>

    </div>
</div>

<body>

<div id="authBox" class="auth neu">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    
<div class="header neu">
    <div>
        <div class="logo">Portfolio Admin Panel</div>
        <div class="sub">Manage your portfolio products</div>
    </div>

    <div class="status">
        ● Live
    </div>
</div>

<div class="wrapper">

    <!-- LEFT PANEL -->
    <div class="left">
        <div class="section neu">

            <h2>Add Product</h2>

            <select id="cat">
                <option value="electronics">Electronics</option>
                <option value="beverages">Beverages</option>
                <option value="cosmetics">Cosmetics</option>

                <option value="furniture">Furniture</option>
                <option value="packaging">Packaging</option>
                <option value="kitchenware">Kitchenware</option>
                <option value="fashion">Fashion</option>
                <option value="luxury">Luxury</option>
                <option value="gaming">Gaming</option>
                <option value="home_decor">Home Decor</option>
            </select>

            <input id="title" placeholder="Title">
            <input id="thumbnail" placeholder="Image URL">
            <input id="video" placeholder="Video URL">
            <textarea id="desc" placeholder="Description"></textarea>

            <button onclick="addProduct()">Add Product</button>

        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
        <div class="section">
            <h2>All Products</h2>
            <div id="list" class="grid"></div>
        </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
    getFirestore, 
    collection, 
    addDoc, 
    getDocs, 
    deleteDoc, 
    doc,
    query,
    where,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
    getAuth, 
    signInWithEmailAndPassword, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// 🔥 FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyDSnDOiZSuMCPYapiQRo8t4BuOMPjuUwok",
  authDomain: "portfolio-mostashfi.firebaseapp.com",
  projectId: "portfolio-mostashfi",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


// ================= AUTH =================

window.login = async function(){
    try{
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        await signInWithEmailAndPassword(auth, email, password);
    }catch(e){
        alert("Login failed: " + e.message);
    }
};

window.logout = async function(){
    await signOut(auth);
};

onAuthStateChanged(auth, user => {

    if(user){
        document.getElementById("authBox").style.display = "none";
        document.querySelector(".wrapper").style.display = "flex";
        document.getElementById("logoutBtn").style.display = "block";

        loadProducts();
    }else{
        document.getElementById("authBox").style.display = "block";
        document.querySelector(".wrapper").style.display = "none";
        document.getElementById("logoutBtn").style.display = "none";
    }

});


// ================= ADD PRODUCT =================

window.addProduct = async function(){

    const data = {
        title: document.getElementById("title").value,
        thumbnail: document.getElementById("thumbnail").value,
        video: document.getElementById("video").value,
        desc: document.getElementById("desc").value
    };

    const cat = document.getElementById("cat").value;

    await addDoc(collection(db, cat), data);

    alert("Added!");
    loadProducts();
};


// ================= LOAD PRODUCTS =================

async function loadProducts(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    const categories = [
        "electronics","beverages","cosmetics","furniture",
        "packaging","kitchenware","fashion","luxury",
        "gaming","home_decor"
    ];

    for (let cat of categories){

        const snap = await getDocs(collection(db, cat));

        for (let d of snap.docs){

            const item = d.data();

            // ❤️ GET LIKE COUNT
            const likesSnap = await getDocs(
                query(
                    collection(db,"likes"),
                    where("productId","==", d.id)
                )
            );

            const likeCount = likesSnap.size;

            const div = document.createElement("div");
            div.className = "card";

            // ✅ SAFE DATA STORAGE
            div.dataset.cat = cat;
            div.dataset.id = d.id;
            div.dataset.title = item.title;
            div.dataset.thumbnail = item.thumbnail;
            div.dataset.video = item.video;
            div.dataset.desc = item.desc;

            div.innerHTML = `
                <img src="${item.thumbnail}" class="thumb" onerror="this.style.display='none'">
                
                <div class="title">${item.title}</div>
                <div class="cat">${cat}</div>

                <div style="margin:8px 0;font-size:14px;">
                    ❤️ ${likeCount}
                </div>

                <button class="editBtn">Edit</button>
                <button class="deleteBtn">Delete</button>
            `;

            // ✅ EDIT BUTTON FIX
            div.querySelector(".editBtn").addEventListener("click", function(){

                editProduct(
                    div.dataset.cat,
                    div.dataset.id,
                    div.dataset.title,
                    div.dataset.thumbnail,
                    div.dataset.video,
                    div.dataset.desc
                );

            });

            // ✅ DELETE BUTTON FIX
            div.querySelector(".deleteBtn").addEventListener("click", function(){
                deleteProduct(div.dataset.cat, div.dataset.id);
            });

            list.appendChild(div);
        }
    }
}


// ================= EDIT MODAL =================

let editState = {
    cat: null,
    id: null
};

window.editProduct = function(cat,id,title,thumb,video,desc){

    editState.cat = cat;
    editState.id = id;

    document.getElementById("editTitle").value = title;
    document.getElementById("editThumbnail").value = thumb;
    document.getElementById("editVideo").value = video;
    document.getElementById("editDesc").value = desc;

    document.getElementById("editModal").style.display = "flex";
};

window.saveEdit = async function(){

    const newTitle = document.getElementById("editTitle").value;
    const newThumb = document.getElementById("editThumbnail").value;
    const newVideo = document.getElementById("editVideo").value;
    const newDesc = document.getElementById("editDesc").value;

    await updateDoc(doc(db, editState.cat, editState.id), {
        title: newTitle,
        thumbnail: newThumb,
        video: newVideo,
        desc: newDesc
    });

    closeModal();
    loadProducts();
};

window.closeModal = function(){
    document.getElementById("editModal").style.display = "none";
};


// ================= DELETE =================

window.deleteProduct = async function(cat,id){

    if(confirm("Delete this product?")){
        await deleteDoc(doc(db, cat, id));
        loadProducts();
    }
};

</script>

</body>
</html>
