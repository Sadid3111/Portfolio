<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostashfi Hoq</title>

<link rel="icon" type="image/png" sizes="32x32" href="thumbnails/h1.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Saira',sans-serif;
}

body{
background:#e0e5ec;
color:#333;
}

/* Banner */
.banner{
width:100%;
height:50vh;
background:url('thumbnails/banner.png') center/cover no-repeat;
position:relative;
}

/* Social */
.banner-social {
position:absolute;
top:7%;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
}

.social-icon {
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#555;
background:#e0e5ec;
box-shadow:4px 4px 15px #a3b1c6,-4px -4px 15px #fff;
}

/* SECTION */
.section{
padding:40px;
}

.section-title{
font-size:1.8rem;
margin-bottom:25px;
font-weight:600;
}

/* GRID */
.container{
display:grid;
grid-template-columns: repeat(5,1fr);
grid-auto-rows:220px;
grid-auto-flow:dense;
gap:25px;
}

a {
    text-decoration: none;
}

/* CARD */
.card{
background:#e0e5ec;
border-radius:20px;
box-shadow:8px 8px 16px #a3b1c6,-8px -8px 16px #fff;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
position:relative;
overflow:hidden;
transition:0.6s cubic-bezier(.4,0,.2,1);
}

.card:hover:not(.expanded){
transform:translateY(-10px);
}

/* Thumbnail */
.card-thumbnail{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
border-radius:20px;
z-index:1;
transition:0.4s ease;
}

/* Title */
.card h3{
position:relative;
top:80px;
z-index:2;
color:#ffffff;
padding:6px 14px;
background:rgba(59, 59, 59, 0.6);
border-radius:8px;
backdrop-filter:blur(6px);
}

/* Content */
.card-content{
position:absolute;
top:15px;
left:15px;
right:15px;
z-index:3;
display:none;
}

/* Description */
.card-desc{
margin-top:10px;
font-size:14px;
line-height:1.4;
color:#ffffff;
padding:10px 12px;
background:rgba(59, 59, 59, 0.6);
border-radius:10px;
backdrop-filter:blur(6px);
}

/* Expanded */
.expanded{
grid-column:span 2;
grid-row:span 2;
z-index:5;
}

.expanded .card-thumbnail{
opacity:0;
pointer-events:none;
}

.expanded .card-content{
display:block;
}

.expanded h3{
position:absolute;
top:5px;
left:15px;
}

.expanded .card-desc{
position:absolute;
top:40px;
left:15px;
right:15px;
}

/* Video */
.video-container{
position:absolute;
top:110px;
left:15px;
right:15px;
bottom:15px;
display:none;
}

.expanded .video-container{
display:block;
}

video{
width:100%;
height:100%;
border-radius:15px;
object-fit:cover;
}

/* Close Button */
.close-btn{
position:absolute;
top:15px;
right:20px;
width:40px;
height:40px;
border-radius:50%;
display:none;
justify-content:center;
align-items:center;
background:#e0e5ec;
box-shadow:5px 5px 10px #a3b1c6,-5px -5px 10px #fff;
cursor:pointer;
}

.expanded .close-btn{
display:flex;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:30px;
right:30px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:#25D366;
background:#e0e5ec;
box-shadow:6px 6px 12px #a3b1c6,-6px -6px 12px #fff;
}

/* Responsive */
@media(max-width:1100px){
.container{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:768px){
.container{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.container{grid-template-columns:repeat(1,1fr);}
}

</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
<div class="banner-social">
<a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
<a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
<a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
</div>
</div>

<!-- ================= ELECTRONICS ================= -->
<div class="section">
<h2 class="section-title">Electronics</h2>
<div class="container" id="electronics"></div>
</div>

<!-- ================= BEVERAGES ================= -->
<div class="section">
<h2 class="section-title">Beverages</h2>
<div class="container" id="beverages"></div>
</div>

<!-- ================= COSMETICS ================= -->
<div class="section">
<h2 class="section-title">Cosmetics</h2>
<div class="container" id="cosmetics"></div>
</div>

<!-- ================= FURNITURE ================= -->
<div class="section">
<h2 class="section-title">Furniture</h2>
<div class="container" id="furniture"></div>
</div>

<!-- ================= PACKAGING ================= -->
<div class="section">
<h2 class="section-title">Packaging</h2>
<div class="container" id="packaging"></div>
</div>

<!-- ================= KITCHENWARE ================= -->
<div class="section">
<h2 class="section-title">Kitchenware</h2>
<div class="container" id="kitchenware"></div>
</div>

<!-- ================= FASHION ================= -->
<div class="section">
<h2 class="section-title">Fashion</h2>
<div class="container" id="fashion"></div>
</div>

<!-- ================= LUXURY ================= -->
<div class="section">
<h2 class="section-title">Luxury</h2>
<div class="container" id="luxury"></div>
</div>

<!-- ================= GAMING ================= -->
<div class="section">
<h2 class="section-title">Gaming</h2>
<div class="container" id="gaming"></div>
</div>

<!-- ================= HOME DECOR ================= -->
<div class="section">
<h2 class="section-title">Home Decor</h2>
<div class="container" id="home_decor"></div>
</div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/8801725525541" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSnDOiZSuMCPYapiQRo8t4BuOMPjuUwok",
  authDomain: "portfolio-mostashfi.firebaseapp.com",
  projectId: "portfolio-mostashfi",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){

    const categories = [
    "electronics",
    "beverages",
    "cosmetics",
    "furniture",
    "packaging",
    "kitchenware",
    "fashion",
    "luxury",
    "gaming",
    "home_decor"
    ];

    for (let cat of categories){

        const container = document.getElementById(cat);
        container.innerHTML = "";

        const querySnapshot = await getDocs(collection(db, cat));

        querySnapshot.forEach(doc => {
            const item = doc.data();

            const card = document.createElement("div");
            card.className = "card";

            // store ID (important)
            card.setAttribute("data-id", doc.id);
            card.setAttribute("data-cat", cat);

            card.innerHTML = `
                <div class="card-thumbnail" style="background-image:url('${item.thumbnail}')"></div>

                <div class="card-content">
                    <h3>${item.title}</h3>
                    <p class="card-desc">${item.desc}</p>
                </div>

                <div class="close-btn">X</div>

                <div class="video-container">
                    <video controls>
                        <source src="${item.video}">
                    </video>
                </div>
            `;

            container.appendChild(card);
        });
    }

    activateCards();
}

function activateCards(){
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {

        card.addEventListener('click', function(){

            cards.forEach(c=>{
                if(c!==card){
                    c.classList.remove('expanded')
                }
            });

            card.classList.toggle('expanded');

        });

        card.querySelector('.close-btn').addEventListener('click', function(e){
            e.stopPropagation();
            card.classList.remove('expanded');
        });

    });
}

loadProducts();

</script>

</body>
</html>
